<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% for user in users %}
        <h1>{{ user.ism }} {{ user.familiya }}</h1>
        <p>{{ user.yosh }} yoshda</p>
        {% if user.yosh < 15 %}
            <p>Siz juda yosh ekansiz</p>
        {% else %}
            <p>Siz qarib qolibsiz</p>
        {% endif %}
    {% endfor %}
</body>
</html>
