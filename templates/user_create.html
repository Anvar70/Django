{% extends 'base.html' %}

{% block content %}

<div style="
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding:20px;
">

    <div style="
        width:480px;
        background:white;
        padding:30px;
        border-radius:18px;
        box-shadow:0 15px 35px rgba(0,0,0,0.2);
    ">

        <h2 style="text-align:center; margin-bottom:20px; color:#333;">
            ➕ Create User
        </h2>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Ism -->
            <label>👤 Ism</label>
            <input type="text" name="name">

            <!-- Familiya -->
            <label>👤 Familiya</label>
            <input type="text" name="surename">

            <!-- Yosh -->
            <label>🎂 Yosh</label>
            <input type="number" name="age">

            <!-- Email -->
            <label>📧 Email</label>
            <input type="email" name="email">

            <!-- Telefon -->
            <label>📞 Telefon raqam</label>
            <input type="text" name="phone">

            <!-- Rasm -->
            <label>🖼 Rasm</label>
            <input type="file" name="picture">

            <!-- Button -->
            <button type="submit">
                Create User
            </button>

        </form>

    </div>

</div>

<!-- STYLE -->
<style>
input {
    width:100%;
    padding:11px;
    margin:6px 0 15px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
    transition:0.3s;
}

input:focus {
    border-color:#764ba2;
    box-shadow:0 0 8px rgba(118,75,162,0.3);
}

button {
    width:100%;
    padding:13px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    transform:scale(1.03);
    opacity:0.95;
}

label {
    font-weight:bold;
    font-size:14px;
    color:#444;
}
</style>

{% endblock %}
