{% extends 'base.html' %}

{% block content %}

<div style="
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding:20px;
">

    <!-- Glass Card -->
    <div style="
        width:420px;
        background:rgba(255,255,255,0.15);
        backdrop-filter: blur(10px);
        border:1px solid rgba(255,255,255,0.2);
        padding:30px;
        border-radius:20px;
        box-shadow:0 20px 40px rgba(0,0,0,0.3);
        color:white;
        text-align:center;
    ">

        <!-- Avatar -->
        <div>
            <img src="{{ users.picture.url }}"
                 style="
                    width:140px;
                    height:140px;
                    object-fit:cover;
                    border-radius:50%;
                    border:4px solid white;
                    box-shadow:0 10px 20px rgba(0,0,0,0.3);
                 ">
        </div>

        <!-- Name -->
        <h2 style="margin-top:15px;">
            {{ users.ism }} {{ users.familiya }}
        </h2>

        <p style="opacity:0.8;">
            🎂 {{ users.yosh }} yosh
        </p>

        <hr style="border:0; height:1px; background:rgba(255,255,255,0.3); margin:15px 0;">

        <!-- Info -->
        <div style="text-align:left; font-size:14px; line-height:1.8;">
            <p>📧 <b>Email:</b> {{ users.email }}</p>
            <p>📞 <b>Telefon:</b> {{ users.phonenumber }}</p>
            <p>🔗 <b>Slug:</b> {{ users.slug }}</p>
        </div>

        <hr style="border:0; height:1px; background:rgba(255,255,255,0.3); margin:15px 0;">

        <!-- Buttons -->
        <div style="display:flex; gap:10px;">

            <a href="{% url 'users_list' %}"
               style="
                    flex:1;
                    padding:10px;
                    border-radius:10px;
                    background:rgba(0,0,0,0.3);
                    color:white;
                    text-decoration:none;
                    transition:0.3s;
               "
               onmouseover="this.style.background='rgba(0,0,0,0.5)'"
               onmouseout="this.style.background='rgba(0,0,0,0.3)'">
                ⬅ Back
            </a>

            <a href="{% url 'user_update' users.slug %}"
               style="
                    flex:1;
                    padding:10px;
                    border-radius:10px;
                    background:#2196F3;
                    color:white;
                    text-decoration:none;
                    transition:0.3s;
               "
               onmouseover="this.style.transform='scale(1.05)'"
               onmouseout="this.style.transform='scale(1)'">
                ✏ Update
            </a>

            <a href="{% url 'user_delete' users.slug %}"
               style="
                    flex:1;
                    padding:10px;
                    border-radius:10px;
                    background:#f44336;
                    color:white;
                    text-decoration:none;
                    transition:0.3s;
               "
               onmouseover="this.style.transform='scale(1.05)'"
               onmouseout="this.style.transform='scale(1)'">
                🗑 Delete
            </a>

        </div>

    </div>

</div>

{% endblock %}
